#########################################################################
# the below config is for production with nginx as a reverse proxy and static file server
# on EC2 


services:

  web:
    build: .
    container_name: coursepay_web

    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"

    volumes:
      - .:/app
      - static_volume:/app/staticfiles

    expose:
      - "8000"

    env_file:
      - .env

    environment:
      - DB_HOST=db
      - DB_NAME=coursepay
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_PORT=5432

    depends_on:
      - db

  frontend:
    image: nginx:alpine
    container_name: coursepay_frontend

    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro

    ports:
      - "80:80"

    depends_on:
      - web

  db:
    image: postgres:15
    container_name: coursepay_db

    volumes:
      - postgres_data:/var/lib/postgresql/data/

    environment:
      - POSTGRES_DB=coursepay
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

volumes:
  postgres_data:
  static_volume: