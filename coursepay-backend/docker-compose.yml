##################################################################
##################################################################
# use below config for development to connect to the database 
#   running on the host machine
# make sure to update the .env file with the correct DB_HOST value


services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=host.docker.internal

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "5500:80"
