services:

  web:
    build: .
    container_name: coursepay_web

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    expose:
      - "8000"

    env_file:
      - .env

    environment:
      - DB_HOST=host.docker.internal

  frontend:
    image: nginx:alpine
    container_name: coursepay_frontend

    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    ports:
      - "5500:80"

    depends_on:
      - web